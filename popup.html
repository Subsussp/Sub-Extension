<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        html{
            overflow: hidden;
        }
        body{
            width: 100%;
            height: 100%;
            background: transparent;
            margin: 0;
            overflow: hidden;
        }
        #btn{
          background-color: #5863F8;
            color:  #efe9f4;
            border: black 2px solid;
            transition: all 300ms cubic-bezier(0.19, 1, 0.22, 1);
        }
        #btn:hover{
            color: black;
            border: black 2px solid;
            background-color: white;
        }
        #Deattachbtn{
        background-color: #171d1c;
            color: white;
            transition: all 300ms cubic-bezier(0.19, 1, 0.22, 1);
            border: black 1px solid;
        }
        #Deattachbtn:hover{
            background-color: white;
            color: #171d1c;
            transition: all 300ms cubic-bezier(0.19, 1, 0.22, 1);
        }
        #support{
             background-color: #efe9f4;
             color: black;
            border: black .5px solid;
            transition: all 300ms cubic-bezier(0.19, 1, 0.22, 1);

        }
         #support:hover{
            background-color: white;
            color:  #171d1c;
            border: black 1px solid;

        }
        #results{
            width:800px;
            padding: 2px;
            background-color: white;
            z-index: 300;
        }

        .container{
            display: flex;
            /* gap: 20px; */
            background-color: transparent;
        }
        .buttn,.buttn1,.buttn2{
            position: relative;
            transition: all 1200ms ease-in-out;
        }

        .after{
            left: 1%;
            margin-top: 0.5px;
            transform-origin: center;
            position: absolute;
            display: inline-block;
            background: linear-gradient(107deg,rgba(46, 46, 58, 1) 0%, rgba(88, 99, 248, 1) 62%);
            width: 30px;
            height: 31px;
            z-index: -20;
            animation-duration: 1200ms;
            animation-timing-function: ease-in-out;
        }
        .after.phase{
            animation-name: animation2!important;
            animation-fill-mode: forwards;
        }
        .after.phase2{
            animation-name: animation3!important;
            animation-fill-mode: forwards;

        }
        .after.Phasereverse{
            animation-name: animation2rev!important;
        }
        .after.Phase2reverse{
            animation-name: animation3rev!important;
        }
        .focus{
           opacity: 1!important;
        }
        .unfocus{
           opacity: 0!important;
        }
        #arrow-back{
            display: none;
            position: absolute;
            left: 0;
            z-index: 600;
            margin: 50px 0 0 20px;
            padding: 5px;
            cursor: pointer;
        }
        #searchcont::after {
            content: "";
            position: absolute;
            right: 0;
            display: inline-block;
            background-color: #ffffff;
            width: 26px;
            height: 39px;
            z-index: 20;

        }      
        #searchcont::before {
            content: "";
            position: absolute;
            left: 0;
            display: inline-block;
            background-color: #ffffff;
            width: 26px;
            height: 39px;
            z-index: 20;
        }

        #inplace {
            animation: Lftright 8s linear infinite ; 
        }
        .subtitle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;

            background: #ffffff;
            color: #000000;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;

            font-family: sans-serif;
            transition: 0.2s;
        }

        .download-btn:hover {
            transform: scale(1.02);
            background: #b3b3ff;
        }

        /* LEFT */
        .left .lang {
        background: #4caf50;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
        }

        .middle {
        flex: 1;
        min-width: 0;
        }

        .title {
        font-size: 14px;
        margin: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
        }

        .release {
        font-size: 12px;
        color: #000000;
        margin: 2px 0;
        word-break: break-word;
        }


        .right {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .download-btn{
            outline: none;
            border: none;
            padding: 6px 3px;
            border-radius: 6px;
            margin: 0;
            text-align: center;
            align-items: center;
            font-family:cursive;
            font-size: 10px;
            background-color: transparent;
            cursor: cell;
        }
        .meta {
        display: flex;
        gap: 8px;
        font-size: 11px;
        margin-top: 4px;
        }

        .tag {
        background: #ff9800;
        padding: 2px 5px;
        border-radius: 5px;
        }

        /* RIGHT */
        .redirect-btn {
            text-decoration: none;
            transition: 0.2s;
        }

        .redirect-btn:hover {
            opacity: .7;
        }

        @keyframes animation2rev {
            0%{
                transform: translateY(0) translateX(160%);
                border-radius: 2px;
            }
            20%{
                transform: translateY(0) translateX(100%);

            }
            50%{
                border-radius: 30px;
            }
            100%{
                transform: translateY(0) translateX(0);
                border-radius: 2px;
            }
        }
        @keyframes animation2 {
            0%{
                transform: translateY(0) translateX(0);
                border-radius: 2px;

            }
            50%{
                border-radius: 30px;
            }
            80%{
                transform: translateY(0) translateX(100%);

            }
            100%{
                transform: translateY(0) translateX(160%);
                border-radius: 2px;
            }
        }
        @keyframes animation3rev {
            0%{
                 transform: translateY(0) translateX(420%);
                border-radius: 2px;

            }
            20%{
                transform: translateY(0) translateX(320%);

            }
            50%{
                border-radius: 30px;
            }
            100%{
                transform: translateY(0) translateX(200%);
                border-radius: 2px;
            }
        }
        @keyframes animation3 {
            0%{
                transform: translateY(0) translateX(270%);
                border-radius: 2px;

            }
            50%{
                border-radius: 30px;
            }

            100%{
                transform: translateY(0) translateX(445%);
                border-radius: 2px;
            }
        }

        @keyframes Lftright {
            to{
                transform: translateY(-50%) translateX(110%);
            }
        }
    </style>
    <title>Popup</title>
</head>
<body>
    <div class="container">

        <div id="results" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" id="arrow-back" viewBox="0 0 24 24">
                <path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42a.996.996 0 0 0-1.41 0l-6.59 6.59a.996.996 0 0 0 0 1.41l6.59 6.59a.996.996 0 1 0 1.41-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1"/>
            </svg>
            <ul id="list" style="display: flex;gap: 20px;flex-wrap: wrap ; list-style: none;margin: 0;padding: 10px 16px; ">
            </ul>
        </div>
        <div style="width: 250px;height: 100%;">            
            <input type="file" id="file" accept=".srt" style="display: none;">
            <div id="searchcont" style="margin-top:0.5rem;width: 100%;display: flex;justify-content: center;position: relative;">
                <label id="comment" style="position: absolute;top: 50%;left: 73%;transform: translate(-50%,-50%);width: 100%;text-align: center;color: #ff000073;pointer-events: none;margin-top: -0.05rem;font-size: 10px;font-weight: bold;opacity: 0;">Nothing Found</label>
                <label id="inplace" style="position: absolute;top: 50%;left: -30%;transform: translate(-50%,-50%);width: 100%;text-align: center;color: #A9A9A9;pointer-events: none;margin-top: -0.05rem;">Search movies and TV shows</label>
                <input type="text" id="subsearch" style="outline: none;border: 2px solid black;padding: 10px 20px 10px 5px ;background-color: transparent;position: relative;">
            </div>
            <div style="width: 250px; gap: 10px;height:250px;display: flex;justify-content:flex-start;align-items: center;flex-direction: column;">
                <hr style="margin-top: 0.5rem; margin-bottom: 0.5rem; width: 100%; border-width: 1px; border-color: #7c7c7c; border-style: solid;"></hr>
                <label id="btn" for="file" style="padding: 10px 10px;;font-family:cursive;user-select: none;font-size: larger;display: flex;"><svg style="text-align: center;" stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 20 20" aria-hidden="true" height="20px" width="20px" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>Upload your subtitles</label>
                <!-- <div style="display: flex;gap: 10px;width: 100%;justify-content: space-evenly;margin-top: 10px;font-size: larger;font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
                </div> -->
                <hr style="margin-top: 0.5rem; margin-bottom: 0.5rem; width: 100%; border-width: 1px; border-color: #7c7c7c; border-style: solid;"></hr>
                <div style="padding: 10px 10px; font-size: larger;;font-family:cursive;user-select: none;cursor: pointer;" id="Deattachbtn">Open Subtitle Controls</div>
                <hr style="margin-top: 0.5rem; margin-bottom: 0.5rem; width: 100%; border-width: 1px; border-color: #7c7c7c; border-style: solid;"></hr>
                <a target="_blank" id="support" href="https://mail.google.com/mail/u/0/?fs=1&to=sofaomda738@gmail.com&tf=cm" style="text-decoration: none;padding: 10px 10px; font-size: larger;;font-family:cursive;user-select: none;cursor: pointer;" id="Deattachbtn">Support</a>
                <hr style="margin-top: 0.5rem; margin-bottom: 0.5rem; width: 100%; border-width: 1px; border-color: #7c7c7c; border-style: solid;"></hr>
            </div>

    </div>
    <script src="popbackground.js"></script>
</body>
</html>
